{% extends "base.html" %}
{% block content %}

<div class="card p-4 mt-4">

    <h4 class="fw-bold mb-3" style="color: var(--primary-blue);">
        Attendance — {{ timetable.subject }} ({{ timetable.get_day_display }})
    </h4>

    <table class="table align-middle">
        <thead>
            <tr style="background: var(--secondary-blue); color: var(--dark-navy);">
                <th>Student</th>
                <th>Joined At</th>
            </tr>
        </thead>

        <tbody>
            {% for r in records %}
            <tr style="background: var(--white); border-left: 4px solid var(--primary-blue);">
                <td>{{ r.student.username }}</td>
                <td>{{ r.joined_at }}</td>
            </tr>

            {% empty %}
            <tr style="background: var(--white); border-left: 4px solid var(--primary-blue);">
                <td colspan="2">No one has joined yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
