{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container d-flex justify-content-center">
    <div class="card p-5 mt-4 mb-4" style="width: 550px;">

        <h3 class="text-center mb-4 fw-bold" style="color: var(--primary-blue);">
            Create Your CloudClass Account
        </h3>

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color: var(--primary-blue);">Username</label>
                <input type="text" name="username" class="form-control" value="{{ form.username.value|default:'' }}"
                    required>
                <small class="text-muted">Letters, digits and @/./+/-/_ only.</small>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color: var(--primary-blue);">Email</label>
                <input type="email" name="email" class="form-control" value="{{ form.email.value|default:'' }}"
                    required>
            </div>

            <!-- Role -->
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color: var(--primary-blue);">Role</label>
                <select name="role" class="form-select">
                    <option value="student" selected>Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color: var(--primary-blue);">Password</label>
                <input type="password" name="password1" class="form-control" required>
                <small class="text-muted">Must be 8+ characters.</small>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color: var(--primary-blue);">
                    Confirm Password
                </label>
                <input type="password" name="password2" class="form-control" required>
            </div>

            <!-- Submit -->
            <button class="btn btn-accent w-100 mt-3 fw-semibold" type="submit">
                Create Account
            </button>

            <p class="mt-3 text-center">
                Already have an account?
                <a href="{% url 'login' %}"
                    style="color: var(--accent-blue); font-weight: 600; text-decoration: underline;">
                    Login
                </a>
            </p>

        </form>

        {% if form.errors %}
        <div class="alert alert-danger mt-3">
            {{ form.errors }}
        </div>
        {% endif %}

    </div>
</div>

{% endblock %}
